services:
  # ── Docker API proxy ──
  # Restricts Docker API access to read-only container/image/info endpoints.
  # Mounting /var/run/docker.sock directly into the portal would let a
  # compromised portal exec into any container, create new ones, read all
  # env vars, etc. docker-socket-proxy (tecnativa) whitelists only what's
  # needed: `docker ps` -equivalent calls over an HTTP shim, read-only.
  docker_socket_proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: portal_docker_socket_proxy
    restart: on-failure:3
    environment:
      # 1 = allow, 0 = deny. Default is all 0; we only allow what the portal reads.
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      # Everything else (EXEC, POST, VOLUMES, SERVICES, SWARM, SECRETS, etc.)
      # stays denied. Proxy returns 403 on those endpoints.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - portal_net
    healthcheck:
      # tecnativa/docker-socket-proxy exposes an HTTP shim on :2375.
      # Use wget against /_ping — image shell is BusyBox ash which lacks bash /dev/tcp.
      # A TCP-socket probe is enough to confirm it's listening — no
      # need to call a specific Docker endpoint.
      test: ["CMD", "sh", "-c", "wget -q -O- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Production ──
  portal-prod:
    build: .
    image: birdmug-portal:latest
    container_name: birdmug_portal
    profiles: ["prod"]
    restart: on-failure:3
    depends_on:
      - docker_socket_proxy
    networks:
      - portal_net
    environment:
      # Portal-namespaced env from birdmug-studios/prd. PORT and
      # MATTERMOST_WEBHOOK_URL are passed BOTH as PORTAL_* (what server.js
      # reads) and as the legacy unprefixed names (what the compose-level
      # healthcheck `process.env.PORT` and the host-port mapping below
      # consume). Both alias to the same Doppler-side value so they can't
      # drift; the legacy aliases drop in a follow-up PR once tests confirm.
      - PORTAL_PORT=${PORTAL_PORT}
      - PORT=${PORTAL_PORT}
      - PORTAL_MATTERMOST_WEBHOOK_URL=${PORTAL_MATTERMOST_WEBHOOK_URL}
      - MATTERMOST_WEBHOOK_URL=${PORTAL_MATTERMOST_WEBHOOK_URL}
      - NODE_ENV=production
      - BIRDMUG_JWT_SECRET=${BIRDMUG_JWT_SECRET}
      - BUGFAIRY_URL=${BUGFAIRY_URL}
      # The docker CLI respects this — no direct socket mount needed.
      - DOCKER_HOST=tcp://docker_socket_proxy:2375
    ports:
      - "3080:${PORTAL_PORT}"
    healthcheck:
      # Read PORT from the container's env at runtime so the probe always
      # matches what Node is actually bound to. Hardcoding here is what
      # caused the 2026-04-28 7-hour outage (Doppler PORT=3080, compose
      # hardcoded 3033, healthcheck always failed, watchdog churned every 5m).
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:'+process.env.PORT+'/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Staging ──
  portal-staging:
    build: .
    container_name: birdmug_portal_staging
    profiles: ["staging"]
    restart: "no"
    depends_on:
      - docker_socket_proxy
    networks:
      - portal_net
    environment:
      # Portal-namespaced env from birdmug-studios/prd. PORT and
      # MATTERMOST_WEBHOOK_URL are passed BOTH as PORTAL_* (what server.js
      # reads) and as the legacy unprefixed names (what the compose-level
      # healthcheck `process.env.PORT` and the host-port mapping below
      # consume). Both alias to the same Doppler-side value so they can't
      # drift; the legacy aliases drop in a follow-up PR once tests confirm.
      - PORTAL_PORT=${PORTAL_PORT}
      - PORT=${PORTAL_PORT}
      - PORTAL_MATTERMOST_WEBHOOK_URL=${PORTAL_MATTERMOST_WEBHOOK_URL}
      - MATTERMOST_WEBHOOK_URL=${PORTAL_MATTERMOST_WEBHOOK_URL}
      - NODE_ENV=production
      - BIRDMUG_JWT_SECRET=${BIRDMUG_JWT_SECRET}
      - BUGFAIRY_URL=${BUGFAIRY_URL}
      - DOCKER_HOST=tcp://docker_socket_proxy:2375
    healthcheck:
      # Read PORT from runtime env so the probe always matches what Node is
      # bound to. See prod healthcheck for the 2026-04-28 outage history.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:'+process.env.PORT+'/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Development ──
  portal-dev:
    build: .
    container_name: birdmug_portal_dev
    profiles: ["dev"]
    restart: on-failure:3
    depends_on:
      - docker_socket_proxy
    networks:
      - portal_net
    environment:
      - PORTAL_PORT=${PORTAL_PORT}
      - PORT=${PORTAL_PORT}
      - BIRDMUG_JWT_SECRET=${BIRDMUG_JWT_SECRET}
      - BUGFAIRY_URL=${BUGFAIRY_URL}
      - DOCKER_HOST=tcp://docker_socket_proxy:2375
    ports:
      - "3081:${PORTAL_PORT}"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:'+process.env.PORT+'/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  portal_net:
    driver: bridge
