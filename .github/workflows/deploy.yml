name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

# Queue concurrent deploys instead of cancelling.
concurrency:
  group: deploy-${{ github.repository }}-main
  cancel-in-progress: false

jobs:
  build-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: falkensteink/ci-templates/.github/workflows/docker-build-push.yml@main
    permissions:
      contents: read
      packages: write

  deploy:
    needs: build-image
    uses: falkensteink/ci-templates/.github/workflows/toshi-staged-deploy.yml@main
    with:
      repo-name: BirdMug-Portal
      branch: main
      # Poll the public health URL after triggering. Without this, the
      # workflow goes green on toshi-bot's webhook ack — i.e. when the
      # deploy is *queued*, not when it's done. That gap masked the
      # 2026-04-28 outage; the run reported success while staged-deploy
      # had silently died on a stale infinite-recursion bug.
      health-url: https://birdmug.com/health
    secrets:
      TOSHI_DEPLOY_SECRET: ${{ secrets.TOSHI_DEPLOY_SECRET }}
