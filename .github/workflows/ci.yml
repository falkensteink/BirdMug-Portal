name: CI

on:
  push:
    branches: ["**"]
    paths-ignore:
      - '**.md'
      - '.dockerignore'
      - '.gitignore'
      - '.env.example'
      - 'memory/**'
      - 'docs/**'
      - 'archive/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.dockerignore'
      - '.gitignore'
      - '.env.example'
      - 'memory/**'
      - 'docs/**'
      - 'archive/**'

# Cancel an in-progress run when a fresher push to the same ref arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: falkensteink/ci-templates/.github/workflows/node-ci.yml@main
    with:
      node-version: "20"
      has-tests: true
      test-command: "npm test"

  compose-lint:
    uses: falkensteink/ci-templates/.github/workflows/compose-lint.yml@main
    with:
      compose-files: "docker-compose.yml"
